services:
  postgres-springboot:
    image: 'postgres:15'
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=boards_spring'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    volumes:
      - postgres-spring-data:/var/lib/postgresql/data

volumes:
  postgres-spring-data:
