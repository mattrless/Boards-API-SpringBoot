spring:
  application:
    name: boards-api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: none # create/update/none
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
  docker:
    compose:
      enabled: false
      
application:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:test-secret-key-test-secret-key-123456}
      expiration: ${JWT_EXPIRES_IN:172800000}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY:geminiapikey}
      model-name: ${GEMINI_MODEL:testmodel}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
