spring:
  application:
    name: boards-api    
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/boards_spring
    username: postgres
    password: postgres  
  jpa:
    hibernate:
      ddl-auto: validate # validate or none in production
    open-in-view: false
    properties:
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: none # create
              create-target: migration_content.sql
  flyway:
    enabled: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret: ${JWT_SECRET:test-secret-key-test-secret-key-123456}
      expiration: ${JWT_EXPIRES_IN:172800000}
