spring:
  application:
    name: boards-api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/boards_spring
    username: postgres
    password: postgres  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate # validate or none in production
    open-in-view: false
    properties:
      "[jakarta.persistence.schema-generation.scripts.action]": none # none create
      "[jakarta.persistence.schema-generation.scripts.create-target]": migration_content.sql
      "[hibernate.format_sql]": true
  flyway:
    enabled: true
    locations: classpath:db/migration
